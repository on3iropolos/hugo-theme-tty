{{ define "main" }}
<div class="terminal-output">
    {{ if .Site.Params.tty.showTerminalHeader }}
    <div class="terminal-header">
        <span class="terminal-title">{{ .File.Path | default .Title }}</span>
    </div>
    {{ end }}
    <div class="terminal-body">
        {{ .Content }}
    </div>
</div>
{{ end }}
